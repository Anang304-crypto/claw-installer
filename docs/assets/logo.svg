<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 24 24" role="img" aria-label="ClawInstaller logo — pixel lobster with hard hat and wrench">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e2140"/>
      <stop offset="100%" stop-color="#151830"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="24" height="24" rx="3.5" fill="url(#bg)"/>

  <!-- Wrench — clear U-shape open end at top -->
  <!-- Wrench outline -->
  <g fill="#2a2a3e">
    <rect x="16" y="4" width="2" height="1"/>
    <rect x="20" y="4" width="2" height="1"/>
    <rect x="15" y="5" width="1" height="4"/>
    <rect x="22" y="5" width="1" height="4"/>
    <rect x="16" y="9" width="1" height="1"/>
    <rect x="21" y="9" width="1" height="1"/>
    <rect x="17" y="10" width="1" height="3"/>
    <rect x="20" y="10" width="1" height="3"/>
    <rect x="16" y="13" width="1" height="1"/>
    <rect x="21" y="13" width="1" height="1"/>
    <rect x="15" y="14" width="1" height="2"/>
    <rect x="22" y="14" width="1" height="2"/>
    <rect x="16" y="16" width="6" height="1"/>
  </g>
  <!-- Wrench body (steel) -->
  <g fill="#B8C0C8">
    <!-- U-shape jaw (open end) — 3 rows tall -->
    <rect x="16" y="5" width="2" height="3"/>
    <rect x="20" y="5" width="2" height="3"/>
    <!-- Jaw base (connects the U) -->
    <rect x="16" y="8" width="6" height="1"/>
    <!-- Neck -->
    <rect x="17" y="9" width="4" height="1"/>
    <!-- Shaft -->
    <rect x="18" y="10" width="2" height="3"/>
    <!-- Transition -->
    <rect x="17" y="13" width="4" height="1"/>
    <!-- Handle end -->
    <rect x="16" y="14" width="6" height="2"/>
  </g>
  <!-- Wrench highlight -->
  <rect x="16" y="5" width="1" height="4" fill="#D0D8E0"/>
  <rect x="16" y="14" width="5" height="1" fill="#D0D8E0"/>

  <!-- Pixel lobster with hard hat -->
  <g transform="translate(1,5)">
    <!-- Hard hat outline (dark gold) -->
    <g fill="#8B6914">
      <rect x="6" y="-1" width="4" height="1"/>
      <rect x="5" y="0" width="1" height="1"/>
      <rect x="10" y="0" width="1" height="1"/>
      <rect x="4" y="1" width="1" height="1"/>
      <rect x="11" y="1" width="1" height="1"/>
      <rect x="3" y="2" width="1" height="1"/>
      <rect x="12" y="2" width="1" height="1"/>
    </g>

    <!-- Hard hat (gold) -->
    <g fill="#FFD700">
      <rect x="6" y="0" width="4" height="1"/>
      <rect x="5" y="1" width="6" height="1"/>
      <rect x="4" y="2" width="8" height="1"/>
    </g>

    <!-- Hat highlight -->
    <rect x="7" y="0" width="2" height="1" fill="#FFE44D"/>
    <rect x="6" y="1" width="3" height="1" fill="#FFE44D"/>

    <!-- Lobster outline (dark) -->
    <g fill="#3a0a0d">
      <rect x="1" y="5" width="1" height="3"/>
      <rect x="2" y="4" width="1" height="1"/>
      <rect x="2" y="8" width="1" height="1"/>
      <rect x="3" y="3" width="1" height="1"/>
      <rect x="3" y="9" width="1" height="1"/>
      <rect x="4" y="10" width="1" height="1"/>
      <rect x="12" y="3" width="1" height="1"/>
      <rect x="12" y="9" width="1" height="1"/>
      <rect x="13" y="4" width="1" height="1"/>
      <rect x="13" y="8" width="1" height="1"/>
      <rect x="14" y="5" width="1" height="3"/>
      <rect x="5" y="11" width="6" height="1"/>
      <rect x="4" y="12" width="1" height="1"/>
      <rect x="11" y="12" width="1" height="1"/>
      <rect x="3" y="13" width="1" height="1"/>
      <rect x="12" y="13" width="1" height="1"/>
      <rect x="5" y="14" width="6" height="1"/>
    </g>

    <!-- Lobster body (red) -->
    <g fill="#ff4f40">
      <rect x="5" y="3" width="6" height="1"/>
      <rect x="4" y="4" width="8" height="1"/>
      <rect x="3" y="5" width="10" height="1"/>
      <rect x="3" y="6" width="10" height="1"/>
      <rect x="3" y="7" width="10" height="1"/>
      <rect x="4" y="8" width="8" height="1"/>
      <rect x="5" y="9" width="6" height="1"/>
      <rect x="5" y="12" width="6" height="1"/>
      <rect x="6" y="13" width="4" height="1"/>
    </g>

    <!-- Claws (lighter red) -->
    <g fill="#ff775f">
      <rect x="1" y="6" width="2" height="1"/>
      <rect x="2" y="5" width="1" height="1"/>
      <rect x="2" y="7" width="1" height="1"/>
      <rect x="13" y="6" width="2" height="1"/>
      <rect x="13" y="5" width="1" height="1"/>
      <rect x="13" y="7" width="1" height="1"/>
    </g>

    <!-- Eyes (dark) -->
    <g fill="#081016">
      <rect x="6" y="5" width="1" height="1"/>
      <rect x="9" y="5" width="1" height="1"/>
    </g>

    <!-- Eye highlights (white) -->
    <g fill="#f5fbff">
      <rect x="6" y="4" width="1" height="1"/>
      <rect x="9" y="4" width="1" height="1"/>
    </g>
  </g>
</svg>
